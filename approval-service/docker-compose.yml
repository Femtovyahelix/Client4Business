services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
      POSTGRES_DB: approval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      APPROVAL_DATABASE_URL: postgresql+asyncpg://approval:approval@db:5432/approval
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
